<svg xmlns="http://www.w3.org/2000/svg" width="540" height="101" viewBox="0 0 540 101" style="overflow:visible">
  <defs>
    <!-- Top ridge — dark metallic -->
    <linearGradient id="ridgeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#3a3a3a"/>
      <stop offset="40%"  stop-color="#2a2a2a"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>

    <!-- Fine matte grain -->
    <filter id="matte" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="1.4" numOctaves="4" seed="3" result="n"/>
      <feColorMatrix type="matrix"
        values="0 0 0 0 0.8  0 0 0 0 0.8  0 0 0 0 0.8  0 0 0 0.09 0"
        in="n" result="g"/>
      <feBlend in="SourceGraphic" in2="g" mode="screen" result="b"/>
      <feComposite in="b" in2="SourceGraphic" operator="in"/>
    </filter>

    <!-- Slot band -->
    <linearGradient id="bandGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#383838"/>
      <stop offset="100%" stop-color="#232323"/>
    </linearGradient>

    <!-- Soft diffused overhead light -->
    <linearGradient id="topLight" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="rgba(255,255,255,0)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.06)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>

    <!-- Horizontal edge fade -->
    <linearGradient id="edgeFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="white" stop-opacity="0"/>
      <stop offset="11%"  stop-color="white" stop-opacity="1"/>
      <stop offset="89%"  stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <mask id="edgeMask">
      <rect x="60" y="0" width="420" height="45" fill="url(#edgeFade)"/>
    </mask>
    <clipPath id="barClip">
      <rect x="60" y="0" width="420" height="45"/>
    </clipPath>

    <!-- Shadow beneath -->
    <radialGradient id="shadowGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="rgba(0,0,0,0.30)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>

    <!-- Background vignette -->
    <radialGradient id="vignette" cx="50%" cy="40%" r="55%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.95)"/>
      <stop offset="55%"  stop-color="rgba(255,255,255,0.60)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- White vignette background -->
  <ellipse cx="270" cy="20" rx="335" ry="63" fill="url(#vignette)"/>

  <!-- Bar body -->
  <g clip-path="url(#barClip)" mask="url(#edgeMask)">

    <!-- Slot band background -->
    <rect x="60" y="21" width="420" height="24" fill="url(#bandGrad)"/>

